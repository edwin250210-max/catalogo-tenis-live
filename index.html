<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Tenis Natalia</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      color: #111;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #000;
      color: white;
      padding: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,.25);
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 22px;
    }

    .controles {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 8px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      font-size: 16px;
    }

    #estado {
      max-width: 1100px;
      margin: 16px auto 0;
      padding: 0 12px;
      font-weight: bold;
    }

    #catalogo {
      max-width: 1100px;
      margin: 14px auto;
      padding: 0 12px 40px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .producto {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
    }

    .producto img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .contenido {
      padding: 12px;
    }

    .nombre {
      margin: 0 0 7px;
      font-size: 16px;
      line-height: 1.25;
    }

    .precio {
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: bold;
    }

    .existencias {
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .tallas {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .talla {
      min-width: 42px;
      padding: 7px 6px;
      border-radius: 7px;
      background: #111;
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }

    .ultimo {
      background: #d40000;
    }

    .sin-resultados {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px 15px;
      font-size: 20px;
    }



    .boton-admin {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      background: #222;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .boton-admin.activo {
      background: #0a7a2f;
    }

    .imagen-producto {
      cursor: zoom-in;
    }

    .visor-imagen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.94);
      cursor: zoom-out;
    }

    .visor-imagen.abierto {
      display: flex;
    }

    .visor-imagen img {
      max-width: 96vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 8px 35px rgba(0,0,0,.5);
    }

    .visor-ayuda {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      color: white;
      text-align: center;
      font-size: 14px;
      pointer-events: none;
    }

    @media (max-width: 850px) {
      #catalogo {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 650px) {
      .controles {
        grid-template-columns: 1fr;
      }

      #catalogo {
        grid-template-columns: repeat(2, 1fr);
        gap: 9px;
        padding: 0 8px 30px;
      }

      .contenido {
        padding: 9px;
      }

      .nombre {
        font-size: 14px;
      }

      .precio {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>TENIS NATALIA</h1>

    <div class="controles">
      <input
        id="buscar"
        type="search"
        placeholder="Buscar modelo o código de barras"
      >

      <select id="ubicacion">
        <option value="shop_location">Shop location</option>
      </select>

      <button id="accesoAdmin" class="boton-admin" type="button">
        🔒 Acceso privado
      </button>

      <select id="talla">
        <option value="">Todas las tallas</option>
        <option>22</option>
        <option>22.5</option>
        <option>23</option>
        <option>23.5</option>
        <option>24</option>
        <option>24.5</option>
        <option>25</option>
        <option>25.5</option>
        <option>26</option>
        <option>26.5</option>
        <option>27</option>
        <option>27.5</option>
        <option>28</option>
        <option>28.5</option>
      </select>
    </div>
  </header>

  <div id="estado">Cargando catálogo...</div>
  <main id="catalogo"></main>

  <div id="visorImagen" class="visor-imagen" aria-hidden="true">
    <img id="imagenGrande" src="" alt="Imagen ampliada">
    <div class="visor-ayuda">Toca otra vez para cerrar</div>
  </div>

  <script>
    const API =
      "https://catalogo-backend-publico.onrender.com/api/catalogo";

    const CONTRASENA_ADMIN = "291118";

    let productos = [];
    let modoAdmin = sessionStorage.getItem("tenisNataliaAdmin") === "1";

    const catalogo = document.getElementById("catalogo");
    const estado = document.getElementById("estado");
    const buscar = document.getElementById("buscar");
    const ubicacion = document.getElementById("ubicacion");
    const talla = document.getElementById("talla");
    const accesoAdmin = document.getElementById("accesoAdmin");
    const visorImagen = document.getElementById("visorImagen");
    const imagenGrande = document.getElementById("imagenGrande");

    function actualizarModoAdmin() {
      const valorActual = ubicacion.value;

      ubicacion.innerHTML = '<option value="shop_location">Shop location</option>';

      if (modoAdmin) {
        ubicacion.insertAdjacentHTML("beforeend", `
          <option value="almacen_2">Almacén de tenis 2</option>
          <option value="total">Ambos almacenes</option>
        `);
        accesoAdmin.textContent = "🔓 Modo privado activo";
        accesoAdmin.classList.add("activo");

        if (["shop_location", "almacen_2", "total"].includes(valorActual)) {
          ubicacion.value = valorActual;
        }
      } else {
        ubicacion.value = "shop_location";
        accesoAdmin.textContent = "🔒 Acceso privado";
        accesoAdmin.classList.remove("activo");
      }

      renderizar();
    }

    function pedirAccesoAdmin() {
      if (modoAdmin) {
        modoAdmin = false;
        sessionStorage.removeItem("tenisNataliaAdmin");
        actualizarModoAdmin();
        return;
      }

      const clave = prompt("Escribe la contraseña:");

      if (clave === null) return;

      if (clave === CONTRASENA_ADMIN) {
        modoAdmin = true;
        sessionStorage.setItem("tenisNataliaAdmin", "1");
        actualizarModoAdmin();
      } else {
        alert("Contraseña incorrecta");
      }
    }

    function abrirImagen(src, alt) {
      if (!src) return;
      imagenGrande.src = src;
      imagenGrande.alt = alt || "Imagen ampliada";
      visorImagen.classList.add("abierto");
      visorImagen.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function cerrarImagen() {
      visorImagen.classList.remove("abierto");
      visorImagen.setAttribute("aria-hidden", "true");
      imagenGrande.src = "";
      document.body.style.overflow = "";
    }

    function limpiarTexto(texto) {
      return String(texto || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function inventarioTalla(variante, almacen) {
      if (almacen === "shop_location") {
        return Number(variante.shop_location || 0);
      }

      if (almacen === "almacen_2") {
        return Number(variante.almacen_2 || 0);
      }

      return Number(variante.total || 0);
    }

    function renderizar() {
      const texto = limpiarTexto(buscar.value);
      const almacen = ubicacion.value;
      const tallaElegida = talla.value;

      const filtrados = productos
        .map(producto => {
          const tallasDisponibles = producto.tallas.filter(variante => {
            const tieneInventario = inventarioTalla(variante, almacen) > 0;
            const coincideTalla =
              !tallaElegida || variante.talla === tallaElegida;

            return tieneInventario && coincideTalla;
          });

          return {
            ...producto,
            tallasDisponibles
          };
        })
        .filter(producto => {
          const codigos = producto.tallas
            .map(v => v.codigo_barras || "")
            .join(" ");

          const coincideBusqueda =
            limpiarTexto(producto.nombre).includes(texto) ||
            limpiarTexto(codigos).includes(texto);

          return coincideBusqueda && producto.tallasDisponibles.length > 0;
        });

      estado.textContent =
        `${filtrados.length} modelos disponibles`;

      if (!filtrados.length) {
        catalogo.innerHTML =
          '<div class="sin-resultados">No encontramos productos disponibles.</div>';
        return;
      }

      catalogo.innerHTML = filtrados.map(producto => {
        const tallasHTML = producto.tallasDisponibles.map(variante => {
          const cantidad = inventarioTalla(variante, almacen);
          const clase = cantidad === 1 ? "talla ultimo" : "talla";

          return `
            <span class="${clase}">
              ${variante.talla}
              <br>
              <small>${cantidad}</small>
            </span>
          `;
        }).join("");

        const inventarioVisible =
          almacen === "shop_location"
            ? `Shop location: ${producto.shop_location}`
            : almacen === "almacen_2"
              ? `Almacén 2: ${producto.almacen_2}`
              : `Shop: ${producto.shop_location} · Almacén 2: ${producto.almacen_2}`;

        return `
          <article class="producto">
            <img
              class="imagen-producto"
              src="${producto.imagen || ""}"
              alt="${producto.imagen_alt || producto.nombre}"
              loading="lazy"
              onerror="this.src='https://placehold.co/600x600?text=Sin+imagen'"
            >

            <div class="contenido">
              <h2 class="nombre">${producto.nombre}</h2>
              <div class="precio">$${Number(producto.precio).toFixed(0)}</div>
              <div class="existencias">${inventarioVisible}</div>
              <div class="tallas">${tallasHTML}</div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function cargarCatalogo() {
      try {
        const respuesta = await fetch(API);

        if (!respuesta.ok) {
          throw new Error(`Error ${respuesta.status}`);
        }

        const datos = await respuesta.json();
        productos = datos.productos || [];

        renderizar();
      } catch (error) {
        console.error(error);

        estado.textContent = "No se pudo cargar el catálogo.";
        catalogo.innerHTML = `
          <div class="sin-resultados">
            Revisa que sigan abiertas las terminales del servidor y ngrok.
          </div>
        `;
      }
    }

    buscar.addEventListener("input", renderizar);
    ubicacion.addEventListener("change", renderizar);
    talla.addEventListener("change", renderizar);
    accesoAdmin.addEventListener("click", pedirAccesoAdmin);

    catalogo.addEventListener("click", evento => {
      const imagen = evento.target.closest(".imagen-producto");
      if (imagen) abrirImagen(imagen.src, imagen.alt);
    });

    visorImagen.addEventListener("click", cerrarImagen);

    document.addEventListener("keydown", evento => {
      if (evento.key === "Escape") cerrarImagen();
    });

    actualizarModoAdmin();
    cargarCatalogo();
  </script>
</body>
</html>
