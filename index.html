<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Tenis Natalia</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      color: #111;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #000;
      color: white;
      padding: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,.25);
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 22px;
    }

    .controles {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    select {
      width: 100%;
      min-height: 72px;
      padding: 18px 16px;
      border: 4px solid #ffe600;
      border-radius: 16px;
      background: #fff;
      color: #111;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 0 3px rgba(255,230,0,.18),
        0 4px 12px rgba(0,0,0,.18);
    }

    #estado {
      max-width: 1100px;
      margin: 16px auto 0;
      padding: 0 12px;
      font-weight: bold;
    }

    #catalogo {
      max-width: 1100px;
      margin: 14px auto;
      padding: 0 12px 40px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .producto {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
    }

    .producto.resurtido {
      border: 3px solid #ff9800;
    }

    .producto img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .contenido {
      padding: 12px;
    }

    .nombre {
      margin: 0 0 7px;
      font-size: 16px;
      line-height: 1.25;
    }

    .existencias {
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .tallas {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .talla {
      min-width: 42px;
      padding: 7px 6px;
      border-radius: 7px;
      background: #111;
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }

    .ultimo {
      background: #d40000;
    }

    .sin-resultados {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px 15px;
      font-size: 20px;
    }

    .boton-admin,
    .boton-resurtir {
      width: 100%;
      min-height: 72px;
      padding: 12px;
      border: 0;
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .boton-admin {
      background: #222;
    }

    .boton-admin.activo {
      background: #0a7a2f;
    }

    .boton-resurtir {
      background: #d95f00;
    }

    .boton-resurtir.activo {
      background: #d40000;
      box-shadow: 0 0 0 3px rgba(255,255,255,.3);
    }

    .boton-resurtir[hidden] {
      display: none;
    }

    .imagen-producto {
      cursor: zoom-in;
    }

    .visor-imagen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.94);
      cursor: zoom-out;
    }

    .visor-imagen.abierto {
      display: flex;
    }

    .visor-imagen img {
      max-width: 96vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 8px 35px rgba(0,0,0,.5);
    }

    .visor-ayuda {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      color: white;
      text-align: center;
      font-size: 14px;
      pointer-events: none;
    }

    .encabezado-resurtido {
      margin-bottom: 10px;
      padding: 9px;
      border-radius: 8px;
      background: #fff4df;
      color: #b34600;
      text-align: center;
      font-size: 14px;
      font-weight: 900;
    }

    .lista-resurtido {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fila-resurtido {
      display: grid;
      grid-template-columns: .7fr 1fr 1fr 1fr;
      align-items: center;
      gap: 4px;
      padding: 8px 5px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      text-align: center;
      font-size: 12px;
    }

    .fila-resurtido.encabezados {
      background: #111;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
    }

    .numero-talla {
      font-size: 15px;
      font-weight: 900;
    }

    .shop-cero {
      color: #d40000;
      font-weight: 900;
    }

    .shop-bajo {
      color: #d95f00;
      font-weight: 900;
    }

    .mandar {
      padding: 5px 3px;
      border-radius: 6px;
      background: #0a7a2f;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
    }

    .resumen-modelo {
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      background: #ffe600;
      color: #111;
      text-align: center;
      font-size: 14px;
      font-weight: 900;
    }

    @media (max-width: 850px) {
      #catalogo {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 650px) {
      .controles {
        grid-template-columns: 1fr;
      }

      select,
      .boton-admin,
      .boton-resurtir {
        min-height: 72px;
      }

      select {
        padding: 18px 12px;
        border-width: 4px;
        border-radius: 16px;
        font-size: 18px;
        font-weight: 900;
      }

      #catalogo {
        grid-template-columns: repeat(2, 1fr);
        gap: 9px;
        padding: 0 8px 30px;
      }

      .contenido {
        padding: 9px;
      }

      .nombre {
        font-size: 14px;
      }

      .fila-resurtido {
        font-size: 11px;
      }

      .mandar {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1 id="tituloCatalogo">CATÁLOGO DE TENIS</h1>

    <div class="controles">
      <button id="accesoAdmin" class="boton-admin" type="button">
        🔒 Acceso privado
      </button>

      <button
        id="botonResurtir"
        class="boton-resurtir"
        type="button"
        hidden
      >
        🚨 Resurtir Shop
      </button>

      <select id="talla">
        <option value="">👉 PRESIONA AQUÍ PARA SELECCIONAR TU TALLA</option>
        <option>22</option>
        <option>22.5</option>
        <option>23</option>
        <option>23.5</option>
        <option>24</option>
        <option>24.5</option>
        <option>25</option>
        <option>25.5</option>
        <option>26</option>
        <option>26.5</option>
        <option>27</option>
        <option>27.5</option>
        <option>28</option>
        <option>28.5</option>
      </select>
    </div>
  </header>

  <div id="estado">Cargando catálogo...</div>
  <main id="catalogo"></main>

  <div id="visorImagen" class="visor-imagen" aria-hidden="true">
    <img id="imagenGrande" src="" alt="Imagen ampliada">
    <div class="visor-ayuda">Toca otra vez para cerrar</div>
  </div>

  <script>
    const API =
      "https://catalogo-backend-publico.onrender.com/api/catalogo";

    const CONTRASENA_ADMIN = "291118";

    /*
      Cantidad objetivo para Shop location.

      Si Shop tiene 0 y Almacén 2 tiene suficiente:
      manda 2.

      Si Shop tiene 1:
      manda 1.
    */
    const OBJETIVO_SHOP = 1;

    let productos = [];
    let modoAdmin = false;
    let modoResurtir = false;

    const catalogo = document.getElementById("catalogo");
    const estado = document.getElementById("estado");
    const talla = document.getElementById("talla");
    const accesoAdmin = document.getElementById("accesoAdmin");
    const botonResurtir = document.getElementById("botonResurtir");
    const tituloCatalogo = document.getElementById("tituloCatalogo");
    const visorImagen = document.getElementById("visorImagen");
    const imagenGrande = document.getElementById("imagenGrande");

    function numeroSeguro(valor) {
      const numero = Number(valor || 0);

      if (!Number.isFinite(numero)) {
        return 0;
      }

      return Math.max(0, numero);
    }

    function inventarioTalla(variante, almacen) {
      if (almacen === "shop_location") {
        return numeroSeguro(variante.shop_location);
      }

      if (almacen === "almacen_2") {
        return numeroSeguro(variante.almacen_2);
      }

      return numeroSeguro(variante.total);
    }

    function calcularCantidadParaMandar(variante) {
      const shop = inventarioTalla(variante, "shop_location");
      const almacen2 = inventarioTalla(variante, "almacen_2");

      const faltante = Math.max(0, OBJETIVO_SHOP - shop);

      return Math.min(faltante, almacen2);
    }

    function actualizarControles() {
      accesoAdmin.textContent = modoAdmin
        ? "🔓 Volver a tienda"
        : "🔒 Acceso privado";

      accesoAdmin.classList.toggle("activo", modoAdmin);

      botonResurtir.hidden = !modoAdmin;

      botonResurtir.textContent = modoResurtir
        ? "📦 Ver catálogo Almacén 2"
        : "🚨 Resurtir Shop";

      botonResurtir.classList.toggle("activo", modoResurtir);

      if (modoResurtir) {
        tituloCatalogo.textContent = "🚨 RESURTIR SHOP";
      } else if (modoAdmin) {
        tituloCatalogo.textContent = "ALMACÉN DE TENIS 2";
      } else {
        tituloCatalogo.textContent = "CATÁLOGO DE TENIS";
      }

      renderizar();
    }

    function pedirAccesoAdmin() {
      if (modoAdmin) {
        modoAdmin = false;
        modoResurtir = false;
        talla.value = "";
        actualizarControles();
        return;
      }

      const clave = prompt("Escribe la contraseña:");

      if (clave === null) return;

      if (clave === CONTRASENA_ADMIN) {
        modoAdmin = true;
        modoResurtir = false;
        talla.value = "";
        actualizarControles();
      } else {
        alert("Contraseña incorrecta");
      }
    }

    function cambiarModoResurtir() {
      if (!modoAdmin) return;

      modoResurtir = !modoResurtir;
      talla.value = "";
      actualizarControles();
    }

    function abrirImagen(src, alt) {
      if (!src) return;

      imagenGrande.src = src;
      imagenGrande.alt = alt || "Imagen ampliada";
      visorImagen.classList.add("abierto");
      visorImagen.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function cerrarImagen() {
      visorImagen.classList.remove("abierto");
      visorImagen.setAttribute("aria-hidden", "true");
      imagenGrande.src = "";
      document.body.style.overflow = "";
    }

    function renderizar() {
      if (modoAdmin && modoResurtir) {
        renderizarResurtido();
        return;
      }

      renderizarCatalogoNormal();
    }

    function renderizarCatalogoNormal() {
      const almacen = modoAdmin
        ? "almacen_2"
        : "shop_location";

      const tallaElegida = talla.value;

      const filtrados = productos
        .map(producto => {
          const variantes = Array.isArray(producto.tallas)
            ? producto.tallas
            : [];

          const tallasDisponibles = variantes.filter(variante => {
            const tieneInventario =
              inventarioTalla(variante, almacen) > 0;

            const coincideTalla =
              !tallaElegida ||
              String(variante.talla) === tallaElegida;

            return tieneInventario && coincideTalla;
          });

          return {
            ...producto,
            tallasDisponibles
          };
        })
        .filter(producto => producto.tallasDisponibles.length > 0);

      estado.textContent =
        `${filtrados.length} modelos disponibles`;

      if (!filtrados.length) {
        catalogo.innerHTML = `
          <div class="sin-resultados">
            No encontramos productos disponibles.
          </div>
        `;
        return;
      }

      catalogo.innerHTML = filtrados.map(producto => {
        const tallasHTML = producto.tallasDisponibles
          .map(variante => {
            const cantidad =
              inventarioTalla(variante, almacen);

            const clase =
              cantidad === 1
                ? "talla ultimo"
                : "talla";

            return `
              <span class="${clase}">
                ${variante.talla}
                <br>
                <small>${cantidad}</small>
              </span>
            `;
          })
          .join("");

        const inventarioVisible = modoAdmin
          ? `Almacén 2: ${numeroSeguro(producto.almacen_2)}`
          : `Shop location: ${numeroSeguro(producto.shop_location)}`;

        return `
          <article class="producto">
            <img
              class="imagen-producto"
              src="${producto.imagen || ""}"
              alt="${producto.imagen_alt || producto.nombre || "Tenis"}"
              loading="lazy"
              onerror="this.src='https://placehold.co/600x600?text=Sin+imagen'"
            >

            <div class="contenido">
              <h2 class="nombre">
                ${producto.nombre || "Producto sin nombre"}
              </h2>

              <div class="existencias">
                ${inventarioVisible}
              </div>

              <div class="tallas">
                ${tallasHTML}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderizarResurtido() {
      const tallaElegida = talla.value;

      const productosParaResurtir = productos
        .map(producto => {
          const variantes = Array.isArray(producto.tallas)
            ? producto.tallas
            : [];

          const tallasParaResurtir = variantes
            .map(variante => {
              const shop =
                inventarioTalla(variante, "shop_location");

              const almacen2 =
                inventarioTalla(variante, "almacen_2");

              const mandar =
                calcularCantidadParaMandar(variante);

              return {
                ...variante,
                shop,
                almacen2,
                mandar
              };
            })
            .filter(variante => {
              const coincideTalla =
                !tallaElegida ||
                String(variante.talla) === tallaElegida;

              return variante.mandar > 0 && coincideTalla;
            });

          const totalMandar = tallasParaResurtir.reduce(
            (suma, variante) => suma + variante.mandar,
            0
          );

          return {
            ...producto,
            tallasParaResurtir,
            totalMandar
          };
        })
        .filter(producto => producto.tallasParaResurtir.length > 0)
        .sort((a, b) => {
          if (b.totalMandar !== a.totalMandar) {
            return b.totalMandar - a.totalMandar;
          }

          return String(a.nombre || "").localeCompare(
            String(b.nombre || ""),
            "es"
          );
        });

      const totalPares = productosParaResurtir.reduce(
        (suma, producto) => suma + producto.totalMandar,
        0
      );

      const totalTallas = productosParaResurtir.reduce(
        (suma, producto) =>
          suma + producto.tallasParaResurtir.length,
        0
      );

      estado.textContent =
        `${productosParaResurtir.length} modelos · ` +
        `${totalTallas} tallas · ` +
        `${totalPares} pares para mandar a Shop`;

      if (!productosParaResurtir.length) {
        catalogo.innerHTML = `
          <div class="sin-resultados">
            ✅ Shop location está bien surtido
            ${tallaElegida ? ` en talla ${tallaElegida}` : ""}.
          </div>
        `;
        return;
      }

      catalogo.innerHTML = productosParaResurtir
        .map(producto => {
          const filas = producto.tallasParaResurtir
            .map(variante => {
              const claseShop =
                variante.shop === 0
                  ? "shop-cero"
                  : "shop-bajo";

              return `
                <div class="fila-resurtido">
                  <div class="numero-talla">
                    ${variante.talla}
                  </div>

                  <div class="${claseShop}">
                    ${variante.shop}
                  </div>

                  <div>
                    ${variante.almacen2}
                  </div>

                  <div class="mandar">
                    ${variante.mandar}
                  </div>
                </div>
              `;
            })
            .join("");

          return `
            <article class="producto resurtido">
              <img
                class="imagen-producto"
                src="${producto.imagen || ""}"
                alt="${producto.imagen_alt || producto.nombre || "Tenis"}"
                loading="lazy"
                onerror="this.src='https://placehold.co/600x600?text=Sin+imagen'"
              >

              <div class="contenido">
                <h2 class="nombre">
                  ${producto.nombre || "Producto sin nombre"}
                </h2>

                <div class="encabezado-resurtido">
                  Necesita surtido
                </div>

                <div class="lista-resurtido">
                  <div class="fila-resurtido encabezados">
                    <div>Talla</div>
                    <div>Shop</div>
                    <div>Alm. 2</div>
                    <div>Mandar</div>
                  </div>

                  ${filas}
                </div>

                <div class="resumen-modelo">
                  Mandar ${producto.totalMandar}
                  ${producto.totalMandar === 1 ? "par" : "pares"}
                </div>
              </div>
            </article>
          `;
        })
        .join("");
    }

    async function cargarCatalogo() {
      try {
        const respuesta = await fetch(API, {
          cache: "no-store"
        });

        if (!respuesta.ok) {
          throw new Error(`Error ${respuesta.status}`);
        }

        const datos = await respuesta.json();

        productos = Array.isArray(datos.productos)
          ? datos.productos
          : [];

        renderizar();
      } catch (error) {
        console.error(error);

        estado.textContent =
          "No se pudo cargar el catálogo.";

        catalogo.innerHTML = `
          <div class="sin-resultados">
            Revisa que el servidor siga activo.
          </div>
        `;
      }
    }

    talla.addEventListener("change", renderizar);

    accesoAdmin.addEventListener(
      "click",
      pedirAccesoAdmin
    );

    botonResurtir.addEventListener(
      "click",
      cambiarModoResurtir
    );

    catalogo.addEventListener("click", evento => {
      const imagen =
        evento.target.closest(".imagen-producto");

      if (imagen) {
        abrirImagen(imagen.src, imagen.alt);
      }
    });

    visorImagen.addEventListener(
      "click",
      cerrarImagen
    );

    document.addEventListener("keydown", evento => {
      if (evento.key === "Escape") {
        cerrarImagen();
      }
    });

    actualizarControles();
    cargarCatalogo();
  </script>
</body>
</html>
